default:
  tags:
    - local
    - docker

stages:
    - prepare
    - test
    - build
    - deploy

variables:
    NODE_VERSION: "20"
    PNPM_VERSION: "9"
    GIT_DEPTH: "20"
    GIT_STRATEGY: fetch
    GIT_CLEAN_FLAGS: -ffdx
    NODE_OPTIONS: --max-old-space-size=3072
    ASTRO_TELEMETRY_DISABLED: "1"
    SKIP_ICON_GENERATION: "true"

.node-job:
    image: node:${NODE_VERSION}-alpine
    before_script:
        - corepack enable
        - corepack prepare pnpm@${PNPM_VERSION} --activate

deps:
    stage: prepare
    extends: .node-job
    tags:
        - local
        - docker
    script:
        - pnpm fetch --frozen-lockfile
        - pnpm install --offline --frozen-lockfile
    artifacts:
        paths:
            - node_modules/
        expire_in: 1 day

test:astro-check:
    stage: test
    extends: .node-job
    tags:
        - local
        - docker
    needs:
        - job: deps
          artifacts: true
    script:
        - pnpm astro check

test:unit:
    stage: test
    extends: .node-job
    tags:
        - local
        - docker
    needs:
        - job: deps
          artifacts: true
    script:
        - pnpm exec vitest run --config vitest.config.ts

test:astro-render:
    stage: test
    extends: .node-job
    tags:
        - local
        - docker
    needs:
        - job: deps
          artifacts: true
    script:
        - pnpm exec vitest run --config vitest.astro.config.ts

build:
    stage: build
    extends: .node-job
    tags:
        - local
        - docker
    variables:
        GIT_DEPTH: "0"
        NODE_OPTIONS: --max-old-space-size=3072
        ASTRO_TELEMETRY_DISABLED: "1"
        UV_THREADPOOL_SIZE: "2"
    needs:
        - job: deps
          artifacts: true
        - job: test:astro-check
        - job: test:unit
        - job: test:astro-render
    script:
        - apk add --no-cache git
        - pnpm build
    artifacts:
        paths:
            - dist/
        expire_in: 1 week

deploy:
    stage: deploy
    extends: .node-job
    tags:
        - local
        - docker
    variables:
        NODE_OPTIONS: --max-old-space-size=3072
        ASTRO_TELEMETRY_DISABLED: "1"
    needs:
        - job: deps
          artifacts: true
        - job: test:astro-check
        - job: test:unit
        - job: test:astro-render
        - job: build
          artifacts: true
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
          when: on_success
        - if: '$CI_COMMIT_TAG'
          when: manual
        - when: never
    script:
        - pnpm exec wrangler deploy
    environment:
        name: production
